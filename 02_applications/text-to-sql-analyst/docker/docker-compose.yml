####################################################################
# Local development stack.
#   docker compose -f docker/docker-compose.yml up --build
#
# Production deployment uses Render (backend) and Streamlit Cloud
# (frontend); this file is for local end-to-end testing.
####################################################################

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-readonly.sql:/docker-entrypoint-initdb.d/01-readonly.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d analytics"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://analyst_ro:readonly@postgres:5432/analytics
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-please-change-me-to-something-very-random-32b}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      CORS_ORIGINS: '["http://localhost:8501"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata:
