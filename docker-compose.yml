services:

  # ── MySQL database (used by database-chatbot) ─────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chatbot_db}
      MYSQL_USER: ${MYSQL_USER:-chatbot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatbotpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database Chatbot ── NL → SQL (port 8501) ──────────────────────────────
  database-chatbot:
    build:
      context: ./02_applications/database-chatbot
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-chatbot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chatbotpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chatbot_db}
    depends_on:
      mysql:
        condition: service_healthy

  # ── Q&A Chatbot ── multi-provider (port 8502) ─────────────────────────────
  qa-chatbot:
    build:
      context: ./02_applications/qa-chatbot
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8502:8502"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_PROJECT: "QA Chatbot"

  # ── Academic Paper Analyzer ── Claude + Groq (port 8503) ──────────────────
  academic-paper-analysis:
    build:
      context: ./02_applications/academic-paper-analysis
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8503:8503"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

volumes:
  mysql_data:
